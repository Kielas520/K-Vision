<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>K-Vision Web Console</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.js"></script>
    <style>
        body { background: #1e1e1e; margin: 0; padding: 20px; height: 100vh; overflow: hidden; }
        #terminal { height: 100%; }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <script>
        const term = new Terminal({
            cursorBlink: true,
            fontSize: 14,
            fontFamily: 'Consolas, monospace',
            theme: { background: '#1e1e1e' }
        });
        term.open(document.getElementById('terminal'));

        const socket = new WebSocket(`ws://${window.location.host}/ws/terminal`);

        socket.onmessage = (event) => {
            term.write(event.data);
        };

        // term.onData 会捕捉用户在网页按下的每一个键（如 1, 2, Enter, Ctrl+C）
        term.onData(data => {
            socket.send(data);
        });

        socket.onclose = () => {
            term.write('\r\n\x1b[31m[Backend Disconnected]\x1b[0m');
        };
    </script>
</body>
</html>
